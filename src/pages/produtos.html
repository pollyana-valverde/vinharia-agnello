<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- link para o arquivo CSS principal padrão -->
    <link rel="stylesheet" href="../styles/index.css">
    <!-- link para o arquivo CSS específico da página de produtos -->
    <link rel="stylesheet" href="../styles/produtos.css">

    <title>Produtos</title>
</head>

<body>
    <!-- Navegação (Cabeçalho) -->
    <header>
        <nav class="navbar-container">
            <!-- Logo com nome da empresa e link para a página inicial -->
            <div class="logo-container">
                <a href="../../index.html">
                    <img class="logo-img" src="../assets/icons/logo.svg" alt="Logo da empresa">
                    <span class="logo-name">Vinharia Agnello</span>
                </a>
            </div>

            <!-- Links de navegação para as páginas principais do site -->
            <ul class="nav-links-container">
                <li class="nav-link"><a href="../../index.html">Ínicio</a></li>
                <li class="nav-link"><a href="./sobre-nos.html">História</a></li>
                <li class="nav-link active"><a href="./produtos.html">Produtos</a></li>
                <li class="nav-link"><a href="./galeria.html">Galeria</a></li>
                <li class="nav-link"><a href="./contato.html">Contato</a></li>
            </ul>

            <!-- Link para o carrinho de compras -->
            <div class="carrinho-compra-container">
                <a href="./carrinho-compra.html">
                    <img class="carrinho-img" src="../assets/icons/bag.svg" alt="Carrinho de compras">
                </a>
            </div>
        </nav>
    </header>

    <!-- Banner principal -->
    <div class="banner-container">
        <span class="banner-badge">Nossa coleção</span>
        <h1 class="banner-title">A adega da Vinharia</h1>
    </div>

    <!-- Conteúdo principal da página de produtos -->
    <main class="main-container">
        <!-- Seção de busca e filtros -->
        <section class="search-section">
            <div class="filters-container">
                <img class="filters-icon" src="../assets/icons/filter.svg" alt="Ícone de filtro">

                <button class="filter-button active" type="button">Todos</button>
                <button class="filter-button" type="button">Tinto seco</button>
                <button class="filter-button" type="button">Branco seco</button>
                <button class="filter-button" type="button">Rosé seco</button>
                <button class="filter-button" type="button">Espumante</button>
            </div>

            <div class="search-input-container">
                <img class="search-icon" src="../assets/icons/search.svg" alt="Ícone de busca">
                <input type="text" name="search" id="search" class="search-input" placeholder="Buscar produtos...">
            </div>
        </section>

        <!-- Seção de resultados -->
        <section class="result-section">
            <span class="result-content" id="result"></span>
        </section>

        <!-- Seção de produtos -->
        <section class="produtos-section" id="produtos-section">
            <!-- Card de produto -->
        </section>
    </main>

    <!-- Rodapé (Footer) -->
    <footer class="footer-container">
        <h5 class="footer-logo-name">Vinharia Agnello</h5>
        <p class="footer-description">Mais de 15 anos de dedicação ao vinho em São Paulo. Nossa equipe especializada
            espera por você.</p>
        <span class="footer-copy">&copy; 2026 Vinharia Agnello. Todos os direitos reservados.</span>
    </footer>

    <script type="module" src="../scripts/produtos.js"></script>
</body>

</html>
